                        <line x1="100" y1="117" x2="100" y2="150" stroke="black" strokeWidth="2"/>
                        <path d="M 60 140 Q 100 180 140 140" fill="none" stroke="black" strokeWidth="3" strokeLinecap="round"/>
                        <g stroke="black" strokeWidth="2" strokeLinecap="round">
                            <line x1="40" y1="110" x2="80" y2="115"/><line x1="35" y1="125" x2="80" y2="125"/><line x1="40" y1="140" x2="80" y2="135"/>
                            <line x1="160" y1="110" x2="120" y2="115"/><line x1="165" y1="125" x2="120" y2="125"/><line x1="160" y1="140" x2="120" y2="135"/>
                        </g>
                        <path d="M 40 175 Q 100 205 160 175" fill="none" stroke="#E74C3C" strokeWidth="8" strokeLinecap="round" />
                        <circle cx="100" cy="188" r="10" fill="#F1C40F" stroke="black" strokeWidth="2"/>
                        <line x1="94" y1="186" x2="106" y2="186" stroke="black" strokeWidth="1.5"/>
                        <circle cx="100" cy="192" r="2.5" fill="black"/>
                    </svg>
                </div>

                <h1 className="text-4xl font-black text-white drop-shadow-[0_2px_2px_rgba(0,0,0,0.5)] text-center tracking-wider">
                    機器貓<br/>注音大冒險
                </h1>

                <button onClick={onStart} className="group relative w-64 bg-red-500 hover:bg-red-600 text-white text-2xl font-bold py-4 px-8 rounded-full border-b-8 border-red-800 active:border-b-0 active:translate-y-2 transition-all shadow-xl flex items-center justify-center gap-3">
                    <IconDoor /> <span>開始闖關</span>
                </button>

                <div className="flex gap-4">
                    <button onClick={onTeaching} className="w-40 bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-3 px-4 rounded-full border-b-4 border-green-700 active:border-b-0 active:translate-y-1 transition-all shadow-lg flex items-center justify-center gap-2">
                        <IconBook /> <span>注音教室</span>
                    </button>
                    <button onClick={onLeaderboard} className="w-40 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 text-xl font-bold py-3 px-4 rounded-full border-b-4 border-yellow-700 active:border-b-0 active:translate-y-1 transition-all shadow-lg flex items-center justify-center gap-2">
                        <IconDorayaki /> <span>排行榜</span>
                    </button>
                </div>
                
                <button onClick={onStory} className="w-64 bg-purple-500 hover:bg-purple-600 text-white text-xl font-bold py-3 px-6 rounded-full border-b-4 border-purple-800 active:border-b-0 active:translate-y-1 transition-all shadow-lg flex items-center justify-center gap-2 mt-2">
                    <IconMagic /> <span>✨ AI 故事機</span>
                </button>
                
                <div className="h-8"></div>
            </div>
        );

        const LevelSelect = ({ onSelectLevel, onBack }) => {
            const [highScores, setHighScores] = useState({});

            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('doraemon_level_highscores') || '{}');
                setHighScores(saved);
            }, []);

            const formatScore = (lvl, score) => {
                if (!score) return null;
                if (lvl === 5) return `${score}秒`;
                return `${score}分`;
            };

            return (
                <div className="flex flex-col items-center h-full p-4 pt-6 overflow-y-auto">
                    <button onClick={onBack} className="self-start mb-2 bg-white/20 p-2 rounded-full text-white hover:bg-white/30">⬅ 回首頁</button>
                    <h2 className="text-3xl font-bold text-white mb-6 drop-shadow-md">選擇關卡</h2>
                    
                    <div className="grid gap-4 w-full max-w-md pb-8">
                        <LevelCard title="聽音辨位" desc="聽聲音，選注音" color="bg-pink-400" icon="👂" onClick={() => onSelectLevel(1)} highScore={formatScore(1, highScores[1])} />
                        <LevelCard title="識字大考驗" desc="看國字，選拼音" color="bg-green-400" icon="👀" onClick={() => onSelectLevel(2)} highScore={formatScore(2, highScores[2])} />
                        <LevelCard title="聲調指揮家" desc="聽發音，找聲調" color="bg-purple-400" icon="🎵" onClick={() => onSelectLevel(3)} highScore={formatScore(3, highScores[3])} />
                        <LevelCard title="拼音大師" desc="組合聲母韻母" color="bg-orange-400" icon={<IconCannon/>} onClick={() => onSelectLevel(4)} highScore={formatScore(4, highScores[4])} />
                        <LevelCard title="記憶吐司" desc="翻牌配對 (計時)" color="bg-[#D2B48C]" icon={<IconMemoryBread/>} onClick={() => onSelectLevel(5)} highScore={formatScore(5, highScores[5])} />
                    </div>
                </div>
            );
        };

        const LevelCard = ({ title, desc, color, icon, onClick, highScore }) => (
            <button onClick={onClick} className={`${color} w-full p-4 rounded-3xl border-4 border-white shadow-lg transform hover:scale-105 transition-transform flex items-center gap-4 text-left relative overflow-hidden`}>
                {highScore && (
                    <div className="absolute top-0 right-0 bg-yellow-300 px-3 py-1 rounded-bl-xl border-l-2 border-b-2 border-yellow-600 flex items-center gap-1 shadow-sm z-10">
                        <IconCrown />
                        <span className="font-black text-yellow-800 text-sm">{highScore}</span>
                    </div>
                )}
                <div className="bg-white w-14 h-14 rounded-2xl flex items-center justify-center text-3xl shadow-inner border-2 border-gray-100 shrink-0">
                    {typeof icon === 'string' ? icon : icon}
                </div>
                <div>
                    <h3 className="text-xl font-bold text-white drop-shadow-sm">{title}</h3>
                    <p className="text-white/90 font-medium text-sm">{desc}</p>
                </div>
                <div className="ml-auto bg-white/20 rounded-full p-1"><svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M9 5l7 7-7 7"></path></svg></div>
            </button>
        );

        const GameScreen = ({ levelMode, onEndGame, onBack }) => {
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [questions, setQuestions] = useState([]);
            const [feedback, setFeedback] = useState(null); 
            const [selectedOption, setSelectedOption] = useState(null);
            
            // Level 4 Specific
            const [pinyinSlots, setPinyinSlots] = useState([]); 
            
            // Level 5 Specific
            const [cards, setCards] = useState([]);
            const [flippedIndices, setFlippedIndices] = useState([]);
            const [matchedIds, setMatchedIds] = useState([]);
            const [timer, setTimer] = useState(0);
            const timerRef = useRef(null);

            useEffect(() => {
                let gameQuestions = [];
                // Reset common states
                setScore(0);
                setCurrentQIndex(0);
                setFeedback(null);
                setFlippedIndices([]);
                setMatchedIds([]);
                setTimer(0);
                setPinyinSlots([]);
                if (timerRef.current) clearInterval(timerRef.current);

                if (levelMode === 1) {
                    const shuffledSymbols = [...zhuyinSymbolsPool].sort(() => 0.5 - Math.random());
                    gameQuestions = shuffledSymbols.slice(0, 10).map((sym, idx) => {
                        const distractors = [];
                        while(distractors.length < 3) {
                            const r = zhuyinSymbolsPool[Math.floor(Math.random() * zhuyinSymbolsPool.length)];
                            if (r !== sym && !distractors.includes(r)) distractors.push(r);
                        }
                        return { id: idx, answer: sym, distractors };
                    });
                } else if (levelMode === 2) {
                    gameQuestions = [...readingPool].sort(() => 0.5 - Math.random()).slice(0, 10).map((item, index) => ({
                        id: index, question: item.q, answer: item.a, distractors: item.d
                    }));
                } else if (levelMode === 3) {
                    gameQuestions = [...tonePool].sort(() => 0.5 - Math.random()).slice(0, 10);
                } else if (levelMode === 4) { // Pinyin Master
                    gameQuestions = [...readingPool].sort(() => 0.5 - Math.random()).slice(0, 5).map((item, index) => {
                        const parts = decomposeZhuyin(item.a);
                        const distractors = [];
                        while(distractors.length < 3) {
                            const r = zhuyinSymbolsPool[Math.floor(Math.random() * zhuyinSymbolsPool.length)];
                            if (!parts.includes(r) && !distractors.includes(r)) distractors.push(r);
                        }
                        if(!parts.includes('ˊ')) distractors.push('ˊ');
                        
                        return { 
                            id: index, 
                            word: item.q, 
                            parts: parts, 
                            options: [...parts, ...distractors].sort(() => 0.5 - Math.random())
                        };
                    });
                } else if (levelMode === 5) { // Memory Match
                    const selectedPairs = [...readingPool].sort(() => 0.5 - Math.random()).slice(0, 8); 
                    let deck = [];
                    selectedPairs.forEach((item, idx) => {
                        deck.push({ id: idx, content: item.q, type: 'char', matchId: idx });
                        deck.push({ id: idx, content: item.a, type: 'zhuyin', matchId: idx });
                    });
                    setCards(deck.sort(() => 0.5 - Math.random()));
                    timerRef.current = setInterval(() => {
                        setTimer(t => t + 1);
                    }, 1000);
                }

                setQuestions(gameQuestions);
            }, [levelMode]);

            useEffect(() => {
                if (levelMode !== 5 && questions.length > 0 && !feedback && questions[currentQIndex]) {
                    const q = questions[currentQIndex];
                    if (q) {
                        setTimeout(() => {
                            if (levelMode === 1 && q.answer) speak(q.answer);
                            if (levelMode === 3 && q.word) speak(`${q.word}。 ${q.hint}`);
                            if (levelMode === 4 && q.word) speak(q.word);
                        }, 500);
                    }
                }
            }, [currentQIndex, questions, feedback, levelMode]);

            const currentQ = questions[currentQIndex];

            const isDataReady = useMemo(() => {
                if (levelMode === 5) return cards.length > 0;
                if (!currentQ) return false;
                if (levelMode === 1 && !currentQ.answer) return false;
                if (levelMode === 2 && !currentQ.question) return false;
                if (levelMode === 3 && !currentQ.word) return false;
                if (levelMode === 4 && !currentQ.parts) return false;
                return true;
            }, [currentQ, levelMode, cards]);

            if (!isDataReady) {
                return <div className="text-white text-2xl p-10 text-center font-bold animate-pulse">機器貓正在準備道具...</div>;
            }

            const handleOptionClick = (opt) => {
                if (feedback) return;
                setSelectedOption(opt);

                let isCorrect = false;
                if (levelMode <= 2) isCorrect = opt === currentQ.answer;
                else if (levelMode === 3) isCorrect = opt === currentQ.answerType;

                if (isCorrect) {
                    setFeedback('correct');
                    speak("答對了！");
                    setScore(s => s + 10);
                } else {
                    setFeedback('wrong');
                    speak("再接再厲！");
                }

                setTimeout(() => {
                    if (currentQIndex < questions.length - 1) {
                        setCurrentQIndex(prev => prev + 1);
                        setFeedback(null);
                        setSelectedOption(null);
                    } else {
                        onEndGame(score + (isCorrect ? 10 : 0));
                    }
                }, 1500);
            };

            const handlePinyinClick = (val) => {
                if (feedback) return;
                speak(val === '—' ? '一聲' : val);
                const newSlots = [...pinyinSlots, val];
                setPinyinSlots(newSlots);

                if (newSlots.length === currentQ.parts.length) {
                    const answerStr = currentQ.parts.join('');
                    const inputStr = newSlots.join('');
                    
                    if (answerStr === inputStr) {
                        setFeedback('correct');
                        speak("答對了！");
                        setScore(s => s + 20); 
                        setTimeout(() => {
                            if (currentQIndex < questions.length - 1) {
                                setCurrentQIndex(prev => prev + 1);
                                setFeedback(null);
                                setPinyinSlots([]);
                            } else {
                                onEndGame(score + 20);
                            }
                        }, 1500);
                    } else {
                        setFeedback('wrong');
                        speak("不對喔");
                        setTimeout(() => {
                            setFeedback(null);
                            setPinyinSlots([]); 
                        }, 1000);
                    }
                }
            };

            const handleCardClick = (index) => {
                if (flippedIndices.length >= 2 || flippedIndices.includes(index) || matchedIds.includes(cards[index].matchId)) return;

                speak(cards[index].content);
                const newFlipped = [...flippedIndices, index];
                setFlippedIndices(newFlipped);

                if (newFlipped.length === 2) {
                    const card1 = cards[newFlipped[0]];
                    const card2 = cards[newFlipped[1]];

                    if (card1.matchId === card2.matchId) {
                        setTimeout(() => {
                            setMatchedIds(prev => [...prev, card1.matchId]);
                            setFlippedIndices([]);
                            speak("好棒！");
                            
                            if (matchedIds.length + 1 === cards.length / 2) {
                                clearInterval(timerRef.current);
                                setTimeout(() => onEndGame(timer), 1000);
                            }
                        }, 800);
                    } else {
                        setTimeout(() => {
                            setFlippedIndices([]);
                        }, 1000);
                    }
                }
            };

            if (levelMode === 5) {
                return (
                    <div className="flex flex-col h-full relative">
                        <div className="flex justify-between items-center p-4">
                            <button onClick={onBack} className="bg-red-500 text-white px-3 py-1 rounded-full text-sm font-bold border-b-2 border-red-800">退出</button>
                            <div className="flex items-center bg-white px-4 py-2 rounded-full border-2 border-blue-500 shadow-md gap-2">
                                <IconTime />
                                <span className="text-xl font-black text-blue-800">{timer}s</span>
                            </div>
                        </div>
                        <div className="flex-1 grid grid-cols-4 gap-2 p-2 content-center">
                            {cards.map((card, idx) => {
                                const isFlipped = flippedIndices.includes(idx) || matchedIds.includes(card.matchId);
                                const isMatched = matchedIds.includes(card.matchId);
                                return (
                                    <div key={idx} className={`flip-card aspect-square cursor-pointer ${isFlipped ? 'flipped' : ''}`} onClick={() => handleCardClick(idx)}>
                                        <div className="flip-card-inner">
                                            <div className="flip-card-front">
                                                <div className="w-8 h-8 opacity-50"><IconMemoryBread /></div>
                                            </div>
                                            <div className={`flip-card-back ${isMatched ? 'bg-green-100 border-green-500' : ''}`}>
                                                <span className="text-2xl font-bold text-gray-800">{card.content}</span>
                                            </div>
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-full relative">
                    <div className="flex justify-between items-center p-4">
                        <button onClick={onBack} className="bg-red-500 text-white px-3 py-1 rounded-full text-sm font-bold border-b-2 border-red-800">退出</button>
                        <div className="flex items-center bg-yellow-100 px-4 py-2 rounded-full border-2 border-yellow-500 shadow-md">
                            <IconDorayaki />
                            <span className="ml-2 text-xl font-black text-yellow-800">{score}</span>
                        </div>
                    </div>

                    <div className="w-full px-8 mb-4">
                        <div className="w-full bg-blue-700/30 rounded-full h-3">
                            <div className="bg-yellow-400 h-3 rounded-full transition-all duration-500" style={{width: `${((currentQIndex + 1) / questions.length) * 100}%`}}></div>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-start pt-2">
                        <div className="relative mb-6 group cursor-pointer" onClick={() => levelMode===4 ? speak(currentQ.word) : (levelMode===1 ? speak(currentQ.answer) : (levelMode===3 ? speak(currentQ.word) : speak(currentQ.question)))}>
                            <div className={`w-32 h-32 bg-white rounded-3xl border-4 border-blue-600 flex items-center justify-center shadow-xl ${feedback === 'wrong' ? 'shake border-red-500' : ''} ${feedback === 'correct' ? 'border-green-500 transform scale-110 transition-transform' : ''}`}>
                                {levelMode === 1 && <span className="text-5xl text-blue-500">🔊</span>}
                                {levelMode === 2 && <span className="text-6xl font-bold text-gray-800 font-serif">{currentQ.question}</span>}
                                {(levelMode === 3 || levelMode === 4) && <span className="text-6xl font-bold text-gray-800">{currentQ.word}</span>}
                            </div>
                        </div>

                        {levelMode === 4 && (
                            <div className="mb-6 flex gap-2">
                                {currentQ.parts.map((_, i) => (
                                    <div key={i} className="w-12 h-12 bg-black/20 rounded-lg border-2 border-white/50 flex items-center justify-center">
                                        <span className="text-2xl text-white font-bold">{pinyinSlots[i] || ''}</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {levelMode === 3 && <p className="text-white text-lg mb-4 font-bold bg-black/20 px-4 py-1 rounded-full">這是第幾聲？</p>}

                        <div className={`grid ${levelMode === 4 ? 'grid-cols-4' : 'grid-cols-2'} gap-3 w-full max-w-md px-6 pb-6`}>
                            {levelMode === 4 
                                ? currentQ.options.map((opt, idx) => (
                                    <button key={idx} onClick={() => handlePinyinClick(opt)} className="h-16 bg-white rounded-xl text-2xl font-bold shadow-md border-b-4 border-orange-200 active:border-b-0 active:translate-y-1 text-orange-600">
                                        {opt}
                                    </button>
                                  ))
                                : (() => {
                                    let options = [];
                                    if (levelMode <= 2) options = [currentQ.answer, ...currentQ.distractors].sort();
                                    else if (levelMode === 3) options = [currentQ.answerType, ...currentQ.distractors].sort();
                                    
                                    return options.map((opt, idx) => {
                                        let display = opt;
                                        if (levelMode === 3) display = opt === 1 ? '一聲' : toneSymbols[opt];
                                        
                                        let btnStyle = "bg-white text-blue-600 border-b-4 border-gray-300";
                                        if (feedback === 'correct' && ((levelMode <= 2 && opt === currentQ.answer) || (levelMode === 3 && opt === currentQ.answerType))) {
                                            btnStyle = "bg-green-500 text-white border-b-4 border-green-700 scale-105";
                                        } else if (feedback === 'wrong' && opt === selectedOption) {
                                            btnStyle = "bg-red-500 text-white border-b-4 border-red-700";
                                        }

                                        return (
                                            <button key={idx} onClick={() => handleOptionClick(opt)} disabled={!!feedback} className={`h-24 rounded-2xl text-4xl font-bold shadow-md transition-all active:scale-95 flex items-center justify-center ${btnStyle}`}>
                                                {display}
                                            </button>
                                        );
                                    })
                                })()
                            }
                        </div>
                        {levelMode === 4 && <div className="text-white/80 text-sm">請依序點選注音</div>}
                    </div>
                </div>
            );
        };

        const ResultScreen = ({ score, levelMode, onRestart, onHome }) => {
            const [highScore, setHighScore] = useState(false);
            const [newLevelRecord, setNewLevelRecord] = useState(false);

            useEffect(() => {
                const savedScores = JSON.parse(localStorage.getItem('doraemon_level_highscores') || '{}');
                const currentHigh = savedScores[levelMode];

                let isNewRecord = false;
                if (levelMode === 5) {
                    if (!currentHigh || score < currentHigh) isNewRecord = true;
                } else {
                    if (!currentHigh || score > currentHigh) isNewRecord = true;
                }

                if (isNewRecord) {
                    savedScores[levelMode] = score;
                    localStorage.setItem('doraemon_level_highscores', JSON.stringify(savedScores));
                    setNewLevelRecord(true);
                }
            }, [score, levelMode]);

            return (
                <div className="flex flex-col items-center justify-center h-full p-6 animate-fade-in text-center">
                    <h2 className="text-4xl font-black text-white mb-6 drop-shadow-md">挑戰結束！</h2>
                    
                    <div className="bg-white p-8 rounded-3xl shadow-2xl border-4 border-yellow-400 mb-8 w-full max-w-sm relative">
                        {newLevelRecord && (
                            <div className="absolute -top-6 -right-6 bg-red-500 text-white font-bold py-2 px-4 rounded-full border-2 border-white rotate-12 animate-bounce-custom z-10">
                                新紀錄！
                            </div>
                        )}
                        <p className="text-gray-500 text-xl mb-2 font-bold">{levelMode === 5 ? '花費時間' : '獲得銅鑼燒'}</p>
                        <div className="flex items-center justify-center gap-2">
                             {levelMode === 5 ? <IconTime/> : <IconDorayaki />}
                             <span className="text-6xl font-black text-yellow-600">
                                {score}{levelMode === 5 ? <span className="text-2xl">秒</span> : ''}
                             </span>
                        </div>
                    </div>

                    <div className="flex flex-col w-full max-w-xs gap-4">
                        <button onClick={onRestart} className="bg-green-500 text-white text-xl font-bold py-4 rounded-full border-b-4 border-green-700 active:border-b-0 active:translate-y-1 shadow-lg">
                            再玩一次
                        </button>
                        <button onClick={onHome} className="bg-blue-600 text-white text-xl font-bold py-3 rounded-full border-b-4 border-blue-800 active:border-b-0 active:translate-y-1 shadow-lg">
                            回主畫面
                        </button>
                    </div>
                </div>
            );
        };

        const Leaderboard = ({ onBack }) => {
            const [highScores, setHighScores] = useState({});
            useEffect(() => {
                setHighScores(JSON.parse(localStorage.getItem('doraemon_level_highscores') || '{}'));
            }, []);

            return (
                <div className="flex flex-col items-center h-full p-6 pt-12">
                     <button onClick={onBack} className="self-start mb-4 bg-white/20 p-2 rounded-full text-white hover:bg-white/30">⬅ 回首頁</button>
                    <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border-4 border-yellow-500">
                        <div className="bg-yellow-400 p-4 text-center border-b-4 border-yellow-500">
                            <h2 className="text-2xl font-black text-yellow-900 flex items-center justify-center gap-2"><IconDorayaki /> 榮譽榜</h2>
                        </div>
                        <div className="p-4 wood-pattern min-h-[300px] flex flex-col gap-3">
                            {[1,2,3,4,5].map(lvl => (
                                <div key={lvl} className="bg-white p-3 rounded-xl border-2 border-gray-200 flex justify-between items-center shadow-sm">
                                    <span className="font-bold text-gray-600">Level {lvl} {lvl===5?'(秒)':'(分)'}</span>
                                    <span className="text-2xl font-black text-orange-500">{highScores[lvl] || '-'}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const TeachingSection = ({ onBack }) => (
            <div className="flex flex-col items-center h-full p-4 pt-10 overflow-y-auto">
                <div className="w-full max-w-md flex justify-between items-center mb-6">
                    <button onClick={onBack} className="bg-white/20 p-2 rounded-full text-white hover:bg-white/30 backdrop-blur-sm">⬅ 回首頁</button>
                    <h2 className="text-3xl font-bold text-white drop-shadow-md">注音教室</h2>
                    <div className="w-10"></div>
                </div>
                <div className="bg-white/10 p-4 rounded-3xl w-full max-w-md mb-8">
                     <p className="text-white text-center mb-4 font-bold bg-black/20 rounded-full py-1">點擊注音聽發音</p>
                     <div className="grid grid-cols-4 gap-3">
                        {zhuyinSymbolsPool.map((symbol) => (
                            <button key={symbol} onClick={() => speak(symbol)} className="aspect-square bg-white rounded-xl shadow-lg border-b-4 border-gray-200 active:border-b-0 active:translate-y-1 active:shadow-inner flex items-center justify-center text-4xl font-bold text-blue-600 hover:bg-yellow-50 hover:text-blue-700 transition-all">{symbol}</button>
                        ))}
                    </div>
                </div>
            </div>
        );

        // --- NEW: Story Generator Component ---
        const StoryGenerator = ({ onBack }) => {
            const [selectedWords, setSelectedWords] = useState([]);
            const [availableWords, setAvailableWords] = useState([]);
            const [story, setStory] = useState("");
            const [isLoading, setIsLoading] = useState(false);

            useEffect(() => {
                shuffleWords();
            }, []);

            const shuffleWords = () => {
                const words = [...readingPool].sort(() => 0.5 - Math.random()).slice(0, 24);
                setAvailableWords(words);
                setSelectedWords([]); 
                setStory(""); 
            };

            const toggleWord = (word) => {
                if (selectedWords.includes(word)) {
                    setSelectedWords(prev => prev.filter(w => w !== word));
                } else {
                    if (selectedWords.length < 5) { 
                        setSelectedWords(prev => [...prev, word]);
                    }
                }
            };

            const handleGenerate = async () => {
                setIsLoading(true);
                setStory("");
                const result = await generateStory(selectedWords);
                setStory(result);
                setIsLoading(false);
                speak(result);
            };

            return (
                <div className="flex flex-col items-center h-full p-4 pt-10 overflow-y-auto">
                    <div className="w-full max-w-md flex justify-between items-center mb-4">
                        <button onClick={onBack} className="bg-white/20 p-2 rounded-full text-white hover:bg-white/30 backdrop-blur-sm">⬅ 回首頁</button>
                        <h2 className="text-2xl font-bold text-white drop-shadow-md">✨ AI 故事機</h2>
                        <div className="w-10"></div>
                    </div>

                    {!story ? (
                        <div className="w-full max-w-md bg-white rounded-3xl p-6 shadow-xl border-4 border-purple-300">
                            <div className="flex justify-between items-center mb-4">
                                <p className="text-gray-700 font-bold text-lg">選 1~5 個喜歡的詞</p>
                                <button onClick={shuffleWords} className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1">
                                    <IconShuffle /> 換一批
                                </button>
                            </div>
                            
                            <div className="grid grid-cols-4 gap-2 mb-6 max-h-64 overflow-y-auto p-1">
                                {availableWords.map((item, idx) => (
                                    <button 
                                        key={idx} 
                                        onClick={() => toggleWord(item.q)}
                                        className={`p-2 rounded-lg border-2 font-bold text-lg transition-all ${selectedWords.includes(item.q) ? 'bg-purple-500 text-white border-purple-700 transform scale-105 shadow-md' : 'bg-gray-100 text-gray-600 border-gray-200'}`}
                                    >
                                        {item.q}
                                    </button>
                                ))}
                            </div>
                            
                            <button 
                                onClick={handleGenerate}
                                disabled={selectedWords.length === 0 || isLoading}
                                className={`w-full py-4 rounded-xl font-bold text-xl shadow-lg border-b-4 transition-all flex items-center justify-center gap-2 ${selectedWords.length === 0 ? 'bg-gray-300 text-gray-500 border-gray-400' : 'bg-yellow-400 text-yellow-900 border-yellow-600 hover:bg-yellow-500 active:border-b-0 active:translate-y-1'}`}
                            >
                                {isLoading ? (
                                    <span className="animate-pulse">變身中...</span>
                                ) : (
                                    <>✨ 變出故事 (已選 {selectedWords.length} 個)</>
                                )}
                            </button>
                        </div>
                    ) : (
                        <div className="w-full max-w-md bg-white rounded-3xl p-6 shadow-xl border-4 border-yellow-400 relative">
                            <div className="absolute -top-6 -right-2 bg-purple-500 text-white px-3 py-1 rounded-full text-sm font-bold shadow-md animate-bounce-custom">
                                故事完成！
                            </div>
                            <div className="bg-yellow-50 p-4 rounded-xl border-2 border-yellow-100 mb-4 min-h-[150px] flex items-center justify-center">
                                <p className="text-xl font-medium text-gray-800 leading-relaxed text-justify">{story}</p>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={() => speak(story)} className="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl border-b-4 border-green-700 active:border-b-0 active:translate-y-1">
                                    🔊 再聽一次
                                </button>
                                <button onClick={() => {setStory(""); setSelectedWords([]);}} className="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl border-b-4 border-blue-700 active:border-b-0 active:translate-y-1">
                                    🔄 再玩一次
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [screen, setScreen] = useState('menu'); 
            const [levelMode, setLevelMode] = useState(1);
            const [finalScore, setFinalScore] = useState(0);

            const startLevel = (mode) => {
                setLevelMode(mode);
                setScreen('playing');
            };

            const handleEndGame = (score) => {
                setFinalScore(score);
                setScreen('result');
            };

            return (
                <div className="h-screen w-screen max-w-lg mx-auto bg-blue-400 relative shadow-2xl overflow-hidden sm:rounded-xl sm:my-8 sm:h-[90vh]">
                    <div className="absolute top-[-50px] right-[-50px] w-40 h-40 bg-white/10 rounded-full blur-xl"></div>
                    <div className="absolute bottom-[-20px] left-[-20px] w-32 h-32 bg-white/10 rounded-full blur-xl"></div>

                    {screen === 'menu' && <MainMenu onStart={() => setScreen('select')} onLeaderboard={() => setScreen('leaderboard')} onTeaching={() => setScreen('teaching')} onStory={() => setScreen('story')} />}
                    {screen === 'select' && <LevelSelect onSelectLevel={startLevel} onBack={() => setScreen('menu')} />}
                    {screen === 'playing' && <GameScreen levelMode={levelMode} onEndGame={handleEndGame} onBack={() => setScreen('menu')} />}
                    {screen === 'result' && <ResultScreen score={finalScore} levelMode={levelMode} onRestart={() => setScreen('select')} onHome={() => setScreen('menu')} />}
                    {screen === 'leaderboard' && <Leaderboard onBack={() => setScreen('menu')} />}
                    {screen === 'teaching' && <TeachingSection onBack={() => setScreen('menu')} />}
                    {screen === 'story' && <StoryGenerator onBack={() => setScreen('menu')} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
